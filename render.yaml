services:
  - type: web
    name: sparkpath
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_URL
        value: https://api.openai.com/v1/responses
      - key: OPENAI_MODEL
        value: gpt-5-nano
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "1800"
      - key: OPENAI_REASONING_EFFORT
        value: minimal
